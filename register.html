<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration | ICAI Global Trade Fair 2026</title>
    <meta name="description" content="Register as a sponsor, speaker, vendor, or exhibitor for the ICAI Global Trade Fair 2026.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/img/ICAIlogo.png">
    <link rel="stylesheet" href="styles.css">
    <style>
        .registration-tabs {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 1rem 2rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: var(--red-gradient);
            border-color: transparent;
            box-shadow: 0 10px 20px rgba(230, 33, 41, 0.2);
        }

        .registration-form-container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 4rem;
            display: none;
        }

        .registration-form-container.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .form-header h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-grid .form-group.full-width {
            grid-column: span 2;
        }

        @media (max-width: 768px) {
            .registration-form-container {
                padding: 2rem;
            }
            .form-grid {
                grid-template-columns: 1fr;
            }
            .form-grid .form-group.full-width {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body class="subpage">
    <nav id="main-nav" class="sticky"></nav>

    <header class="subpage-header">
        <div class="container">
            <span class="badge">Registration</span>
            <h1>Join the <span class="highlight-red">Movement</span></h1>
            <p class="lead-text">Choose your participation category and secure your spot in the global industrial future.</p>
        </div>
    </header>

    <main class="container section-padding">
        <div class="registration-portal-wrapper">
            <div class="form-header">
                <h2>Registration <span class="highlight-red">Portal</span></h2>
                <p>Please fill out the form below to register your participation for ICAI 2026.</p>
            </div>

            <!-- Google Form Embed Container -->
            <div class="google-form-frame" style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.3); position: relative; padding-top: 10px;">
                <!-- 
                     INSTRUCTIONS: 
                     1. Create your Google Form.
                     2. Click 'Send' -> Select the '< >' Embed Icon.
                     3. Copy the URL inside the 'src' attribute.
                     4. Paste it into the 'src' below.
                -->
                <iframe 
                    src="https://docs.google.com/forms/d/e/1FAIpQLSe_X6Oq4-V3w-X0_Y-7v_vj9-f0_Y-7v_vj9-f0_Y-7v_vj9-f0_Y-7v_vj9-f/viewform?embedded=true" 
                    width="100%" 
                    height="1200" 
                    frameborder="0" 
                    marginheight="0" 
                    marginwidth="0">
                    Loading…
                </iframe>
            </div>

            <div class="portal-footer" style="margin-top: 3rem; text-align: center; opacity: 0.7;">
                <p><i data-lucide="info" style="width: 16px; display: inline-block; vertical-align: middle; margin-right: 5px;"></i> Having trouble? Contact us at <a href="mailto:info@icaihq.com" style="color: var(--industrial-red);">info@icaihq.com</a></p>
            </div>
        </div>
    </main>

    <footer class="main-footer"></footer>

    <script src="app.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
