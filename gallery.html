<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Gallery | ICAI Trade Fair 2026</title>
    <meta name="description" content="Visual highlights from the ICAI Trade Fair and industrial commercialization initiatives.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/img/ICAIlogo.png">
    <link rel="stylesheet" href="styles.css">
    <style>
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 3rem;
        }
        .gallery-item {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            aspect-ratio: 4/3;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }
        .gallery-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }
        .gallery-item:hover img {
            transform: scale(1.1);
        }
        .gallery-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(11, 33, 56, 0.8), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: flex-end;
            padding: 1.5rem;
        }
        .gallery-item:hover .gallery-overlay {
            opacity: 1;
        }
        .gallery-overlay span {
            color: #fff;
            font-weight: 600;
            font-size: 0.9rem;
            transform: translateY(10px);
            transition: transform 0.4s ease;
        }
        .gallery-item:hover .gallery-overlay span {
            transform: translateY(0);
        }
    </style>
</head>
<body class="subpage">
    <nav id="main-nav" class="sticky"></nav>

    <header class="subpage-header">
        <div class="container">
            <span class="badge">Visual Highlights</span>
            <h1>Event <span class="highlight-red">Gallery</span></h1>
            <p class="lead-text">Capturing the moments of industrial innovation and partnership.</p>
        </div>
    </header>

    <main class="container">
        <div class="gallery-grid">
            <div class="gallery-item">
                <img src="assets/img/gallery/g1.png" alt="Gallery Image 1">
                <div class="gallery-overlay"><span>Industrial Excellence</span></div>
            </div>
            <div class="gallery-item">
                <img src="assets/img/gallery/g2.png" alt="Gallery Image 2">
                <div class="gallery-overlay"><span>Innovation Summit</span></div>
            </div>
            <div class="gallery-item">
                <img src="assets/img/gallery/g3.png" alt="Gallery Image 3">
                <div class="gallery-overlay"><span>Strategic Partnerships</span></div>
            </div>
            <div class="gallery-item">
                <img src="assets/img/gallery/g4.png" alt="Gallery Image 4">
                <div class="gallery-overlay"><span>Future of Industry</span></div>
            </div>
            <div class="gallery-item">
                <img src="assets/img/gallery/g5.png" alt="Gallery Image 5">
                <div class="gallery-overlay"><span>Market Access</span></div>
            </div>
            <div class="gallery-item">
                <img src="assets/img/gallery/g6.png" alt="Gallery Image 6">
                <div class="gallery-overlay"><span>Commodity Potential</span></div>
            </div>
            <div class="gallery-item">
                <img src="assets/img/gallery/g7.png" alt="Gallery Image 7">
                <div class="gallery-overlay"><span>Global Networking</span></div>
            </div>
            <div class="gallery-item">
                <img src="assets/img/gallery/g8.png" alt="Gallery Image 8">
                <div class="gallery-overlay"><span>Unlocking Potential</span></div>
            </div>
        </div>
    </main>

    <footer class="main-footer"></footer>

    <script src="app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
